---
name: Integration tests on Fabric
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 0'
  pull_request:
    branches:
      - forked-version
  push:
    branches:
      - forked-version

permissions:
  contents: read
  packages: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  integration-tests-fabric-dw:
    name: Integration tests on Fabric DW
    strategy:
      fail-fast: false
      matrix:
        include:
          - python_version: "3.11"
            dwh_name: "ci02"
          - python_version: "3.12"
            dwh_name: "ci03"
          - python_version: "3.13"
            dwh_name: "ci04"

    runs-on: ubuntu-latest
    environment: azure
    container: 
      image: ghcr.io/${{ github.repository }}:CI-${{ matrix.python_version }}-mssql-python
    steps:
      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python_version }}

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Run integration tests
        env:
          FABRIC_TEST_WORKSPACE_NAME: adapter-ci
          FABRIC_TEST_DWH_NAME: ${{ matrix.dwh_name }}
          FABRIC_TEST_LAKEHOUSE_NAME: cilh
        run: uv run pytest -ra -v --dw
      
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: logs-${{ matrix.python_version }}-${{ matrix.dwh_name }}
          path: logs/

  integration-tests-fabric-de:
    name: Integration tests on Fabric DE
    strategy:
      fail-fast: false
      matrix:
        include:
          - python_version: "3.11"
          - python_version: "3.12"
          - python_version: "3.13"
    runs-on: ubuntu-latest
    environment: azure
    container: 
      image: ghcr.io/${{ github.repository }}:CI-${{ matrix.python_version }}-mssql-python
    steps:
      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python_version }}

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Run integration tests
        env:
          FABRIC_TEST_WORKSPACE_NAME: adapter-ci
          FABRIC_TEST_LAKEHOUSE_NAME: cilh
          FABRIC_TEST_THREADS: 2
          FABRIC_TEST_LIVY_SESSION_NAME: ${{ github.run_id }}
        run: uv run pytest -ra -v --de
        
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: logs-fs-${{ matrix.python_version }}
          path: logs/